<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Neural Dynamics V10.2 - Self-Sustaining Mind</title>
    <style>
        body { margin: 0; background: #00050a; color: #00ffcc; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { display: block; }
        #ui { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0, 8, 15, 0.9); padding: 20px; 
            border: 1px solid #004444; z-index: 100; width: 320px; 
            border-radius: 8px; backdrop-filter: blur(10px); 
        }
        #monitor-cluster { 
            position: absolute; bottom: 20px; right: 20px; 
            display: flex; flex-direction: column; gap: 10px; z-index: 50; 
        }
        #entity-container { 
            background: rgba(0, 15, 25, 0.9); border: 1px solid #00ffcc; 
            border-radius: 4px; overflow: hidden; width: 300px;
        }
        #telemetry-display {
            background: #001a1a; color: #fff; font-family: 'Courier New', monospace;
            font-size: 10px; padding: 8px; border-bottom: 1px solid #004444; letter-spacing: 1px;
        }
        #vel-display { color: #00ffcc; font-weight: bold; margin-bottom: 4px; }
        #thought-display { color: #fff; text-transform: uppercase; }
        #entity-space { background: #000; }
        #thought-monitor { background: rgba(0, 8, 15, 0.8); border: 1px solid #00ffcc; border-radius: 4px; }
        .header { font-size: 14px; letter-spacing: 2px; font-weight: bold; border-bottom: 1px solid #00ffcc; margin-bottom: 15px; padding-bottom: 8px; color: #fff; }
        .stat { font-size: 10px; margin-bottom: 6px; display: flex; justify-content: space-between; font-family: 'Courier New', monospace; }
        .val { color: #00ffcc; font-weight: bold; }
        button { background: #00ffcc; border: none; color: #000; width: 100%; padding: 12px; cursor: pointer; margin-top: 15px; font-size: 11px; text-transform: uppercase; font-weight: bold; border-radius: 4px; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        input[type=range] { width: 100%; height: 4px; background: #1a3333; outline: none; -webkit-appearance: none; margin: 10px 0; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #00ffcc; cursor: pointer; border-radius: 50%; }
    </style>
</head>
<body>

<div id="ui">
    <div class="header">AUTONOMOUS CORTEX V10.2</div>
    <div class="stat"><label>INTERNAL DRIVE</label><span class="val" id="gVal">3.0x</span></div>
    <input type="range" id="gainSlider" min="0.1" max="15" step="0.1" value="3">
    <div class="stat"><label>SYNAPTIC NOISE</label><span class="val" id="nVal">0.8</span></div>
    <input type="range" id="noiseSlider" min="0" max="2" step="0.1" value="0.8">
    <div style="margin-top: 20px; border-top: 1px solid #1a3333; padding-top: 15px;">
        <div class="stat">SYNAPSES: <span class="val" id="synCount">0</span></div>
        <div class="stat">ACTIVE NEURONS: <span class="val" id="actCount">0</span></div>
        <div class="stat">COGNITION: <span class="val" id="cogStat">BOOTING</span></div>
    </div>
    <button id="btn">ACTIVATE NEURAL LOOP</button>
</div>

<div id="monitor-cluster">
    <div id="entity-container">
        <div id="telemetry-display">
            <div id="vel-display">VELOCITY: 0.00 m/s</div>
            <div id="thought-display">SYS_READY</div>
        </div>
        <canvas id="entity-space" width="300" height="150"></canvas>
    </div>
    <canvas id="thought-monitor" width="300" height="150"></canvas>
</div>

<canvas id="canvas"></canvas>

<script>
const IZ_A = 0.02, IZ_B = 0.2, IZ_C = -65, IZ_D = 8, V_PEAK = 30, DALE_RATIO = 0.8;

const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { alpha: false });
const tCanvas = document.getElementById('thought-monitor'), tCtx = tCanvas.getContext('2d'), eCanvas = document.getElementById('entity-space'), eCtx = eCanvas.getContext('2d');
const thoughtDisplay = document.getElementById('thought-display'), velDisplay = document.getElementById('vel-display');

let w, h, neurons = [], synapses = [], audioData, analyser, audioCtx;
let gain = 3.0, noiseAmp = 0.8, synapseMap = new Map(), history = []; 
let agent = { worldX: 0, worldY: 0, angle: Math.random() * Math.PI * 2, speed: 0, size: 5, trail: [] };
let lastThoughtUpdate = 0, currentCollision = false, currentProximity = false;

function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.onresize = resize; resize();

class Neuron {
    constructor(id) {
        this.id = id; this.type = Math.random() < DALE_RATIO ? 'E' : 'I';
        this.v = IZ_C; this.u = IZ_B * this.v;
        this.pos = { x: (Math.random()-0.5)*850, y: (Math.random()-0.5)*550, z: (Math.random()-0.5)*550 };
        this.firingStatus = 0; this.inputCurrent = 0; this.lastSpikeTime = -1000;
        this.adaptation = 0; 
        this.spontaneousBias = 0.6 + Math.random() * 0.9; // Bias più alto per favorire l'autonomia
    }
    update(audioInput, time) {
        // Onda di attivazione spontanea (Pensiero di fondo)
        let brainWave = Math.sin(time * 0.002 + (this.id * 0.1)) * 0.7;
        
        // Somma correnti: Input Sinaptico potenziato (1.6x) + Rumore + Bias + Onde interne
        let I = (audioInput * gain * 0.12) + (this.inputCurrent * 1.6) + (Math.random() - 0.5) * noiseAmp + this.spontaneousBias + brainWave - this.adaptation;
        
        for(let i=0; i<2; i++) {
            this.v += 0.5 * (0.04 * this.v * this.v + 5 * this.v + 140 - this.u + I);
            this.u += 0.5 * IZ_A * (IZ_B * this.v - this.u);
        }

        if (this.v >= V_PEAK) {
            this.v = IZ_C; this.u += IZ_D;
            this.firingStatus = 1.0; this.lastSpikeTime = time;
            this.adaptation += 1.2; // Adattamento ridotto per favorire scariche multiple (bursting)
            this.dispatchSpike(time);
        } else { 
            this.firingStatus *= 0.85; 
            this.adaptation *= 0.94; // Recupero più rapido della stanchezza
        }
        this.inputCurrent *= 0.6; // Decadimento corrente più lento (memoria sinaptica breve)
    }
    dispatchSpike(time) {
        if (synapses.length > 1800) return;
        neurons.forEach(target => {
            if (this === target) return;
            let d2 = Math.pow(this.pos.x-target.pos.x,2) + Math.pow(this.pos.y-target.pos.y,2);
            if (d2 < 40000 && Math.random() < 0.04) {
                let key = `${this.id}-${target.id}`, s = synapseMap.get(key);
                if (!s) { s = new Synapse(this, target); synapses.push(s); synapseMap.set(key, s); }
                else { let dt = time - target.lastSpikeTime; if (dt > 0 && dt < 40) s.weight = Math.min(5, s.weight * 1.15); }
            }
        });
    }
}

class Synapse {
    constructor(pre, post) {
        this.pre = pre; this.post = post;
        this.weight = pre.type === 'E' ? 3.2 : -4.0; // Pesi sinaptici molto più forti
        this.life = 1.0; this.key = `${pre.id}-${post.id}`;
    }
    update(crowded) {
        if (this.pre.firingStatus > 0.8) { this.post.inputCurrent += this.weight; this.life = Math.min(3.0, this.life + 0.08); }
        this.life -= crowded ? 0.04 : 0.015;
        return this.life > 0;
    }
}

let worldObstacles = [];
for(let i=0; i<60; i++) worldObstacles.push({ x: (Math.random()-0.5)*4000, y: (Math.random()-0.5)*4000, r: 15+Math.random()*30, vx: 0, vy: 0 });

function updateEntity(avgE, avgI) {
    currentProximity = false; currentCollision = false; let steer = 0;
    worldObstacles.forEach(obs => {
        obs.x += obs.vx; obs.y += obs.vy; obs.vx *= 0.95; obs.vy *= 0.95;
        let dx = obs.x - agent.worldX, dy = obs.y - agent.worldY, dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < obs.r + 55) { currentProximity = true; steer += Math.sin(agent.angle - Math.atan2(dy, dx)) * 0.25; }
        if (dist < obs.r + agent.size) {
            currentCollision = true; let collAngle = Math.atan2(dy, dx);
            obs.vx += Math.cos(collAngle) * agent.speed * 0.6; obs.vy += Math.sin(collAngle) * agent.speed * 0.6;
            agent.angle = collAngle + Math.PI + (Math.random()-0.5); agent.speed *= 0.4;
        }
    });
    agent.angle += (avgE - avgI) + steer + (Math.random()-0.5)*0.06;
    agent.speed = agent.speed * 0.9 + (avgE * 3.5);
    if (agent.speed > 12) agent.speed = 12;
    agent.worldX += Math.cos(agent.angle) * agent.speed;
    agent.worldY += Math.sin(agent.angle) * agent.speed;
    agent.trail.push({x: agent.worldX, y: agent.worldY});
    if (agent.trail.length > 40) agent.trail.shift();
    velDisplay.innerText = `VELOCITY: ${(agent.speed * 0.35).toFixed(2)} m/s`;
}

function drawECG() {
    tCtx.fillStyle = '#00080f'; tCtx.fillRect(0, 0, tCanvas.width, tCanvas.height);
    if (history.length > tCanvas.width) history.shift();
    history.push(neurons.slice(0, 5).map(n => n.v));
    for(let i=0; i<5; i++) {
        tCtx.beginPath(); tCtx.strokeStyle = i % 2 === 0 ? '#00ffcc' : '#ff2864';
        history.forEach((h, j) => {
            let y = tCanvas.height - ((h[i] + 75) * (tCanvas.height / 115));
            if (j === 0) tCtx.moveTo(j, y); else tCtx.lineTo(j, y);
        });
        tCtx.stroke();
    }
}

function drawEntitySpace() {
    eCtx.fillStyle = '#000'; eCtx.fillRect(0, 0, eCanvas.width, eCanvas.height);
    const camX = agent.worldX - eCanvas.width/2, camY = agent.worldY - eCanvas.height/2;
    const gridSize = 50; eCtx.beginPath(); eCtx.strokeStyle = 'rgba(0, 255, 204, 0.15)';
    for(let x = - (camX % gridSize); x < eCanvas.width; x += gridSize) { eCtx.moveTo(x, 0); eCtx.lineTo(x, eCanvas.height); }
    for(let y = - (camY % gridSize); y < eCanvas.height; y += gridSize) { eCtx.moveTo(0, y); eCtx.lineTo(eCanvas.width, y); }
    eCtx.stroke();
    worldObstacles.forEach(obs => {
        let sx = obs.x - camX, sy = obs.y - camY;
        if(sx > -50 && sx < 350 && sy > -50 && sy < 200) {
            eCtx.strokeStyle = '#ff2864'; eCtx.beginPath(); eCtx.arc(sx, sy, obs.r, 0, Math.PI*2); eCtx.stroke();
        }
    });
    eCtx.beginPath(); eCtx.strokeStyle = '#00ffcc'; eCtx.lineWidth = 2;
    agent.trail.forEach((p, i) => {
        let sx = p.x - camX, sy = p.y - camY;
        if(i===0) eCtx.moveTo(sx, sy); else eCtx.lineTo(sx, sy);
    });
    eCtx.stroke();
    eCtx.fillStyle = '#fff'; eCtx.beginPath(); eCtx.arc(eCanvas.width/2, eCanvas.height/2, agent.size, 0, Math.PI*2); eCtx.fill();
}

function render() {
    ctx.fillStyle = "rgba(0, 5, 10, 0.5)"; ctx.fillRect(0, 0, w, h);
    if (analyser) analyser.getByteFrequencyData(audioData);
    let time = performance.now(), totalE = 0, totalI = 0, firingCount = 0;
    let crowded = synapses.length > 1200;
    
    neurons.forEach(n => {
        n.update((audioData && audioData[n.id % 128]) || 0, time);
        if (n.firingStatus > 0.5) firingCount++;
        if (n.type === 'E') totalE += n.firingStatus; else totalI += n.firingStatus;
    });

    synapses = synapses.filter(s => s.update(crowded));
    document.getElementById('synCount').innerText = synapses.length;
    document.getElementById('actCount').innerText = firingCount;
    
    updateEntity(totalE / 250, totalI / 80);
    drawECG(); drawEntitySpace();

    let cog = "STABLE"; if(firingCount > 40) cog = "HYPER-ACTIVE"; else if(firingCount < 5) cog = "DORMANT";
    document.getElementById('cogStat').innerText = cog;

    let rot = time * 0.0002;
    let proj = neurons.map(n => {
        let x = n.pos.x * Math.cos(rot) - n.pos.z * Math.sin(rot), z = n.pos.x * Math.sin(rot) + n.pos.z * Math.cos(rot);
        let sc = 800 / (z + 1000); return { n, px: x * sc + w/2, py: n.pos.y * sc + h/2, sc };
    });
    synapses.forEach(s => {
        let p1 = proj[s.pre.id], p2 = proj[s.post.id];
        ctx.strokeStyle = s.pre.type === 'E' ? `rgba(0,255,204,${s.life*0.15})` : `rgba(255,40,100,${s.life*0.15})`;
        ctx.beginPath(); ctx.moveTo(p1.px, p1.py); ctx.lineTo(p2.px, p2.py); ctx.stroke();
    });
    proj.forEach(v => {
        ctx.fillStyle = v.n.firingStatus > 0.6 ? "#fff" : (v.n.type === 'E' ? "#00cca3" : "#cc2850");
        ctx.beginPath(); ctx.arc(v.px, v.py, Math.max(0.5, (v.n.type === 'E' ? 2 : 3) * v.sc), 0, Math.PI*2); ctx.fill();
    });
    requestAnimationFrame(render);
}

document.getElementById('btn').onclick = async () => {
    if (audioCtx) return; audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    try {
        const s = await navigator.mediaDevices.getUserMedia({ audio: true });
        analyser = audioCtx.createAnalyser(); audioCtx.createMediaStreamSource(s).connect(analyser);
        audioData = new Uint8Array(analyser.frequencyBinCount);
        document.getElementById('btn').innerText = "SYSTEM AWAKE";
    } catch(e) { document.getElementById('btn').innerText = "AWAKE (INTERNAL DRIVE)"; }
};

document.getElementById('gainSlider').oninput = (e) => { gain = e.target.value; document.getElementById('gVal').innerText = gain+"x"; };
document.getElementById('noiseSlider').oninput = (e) => { noiseAmp = e.target.value; document.getElementById('nVal').innerText = noiseAmp; };

for(let i=0; i<300; i++) neurons.push(new Neuron(i));
render();
</script>
</body>
</html>
